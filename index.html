<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>ORBIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #060816;
      --bg-1: #091126;
      --bg-2: #140b26;
      --neon-cyan: #47f5ff;
      --neon-blue: #6ebdff;
      --neon-purple: #ae56ff;
      --neon-green: #70ff8e;
      --neon-red: #ff5a5a;
      --neon-orange: #ff9c47;
      --neon-yellow: #ffe56b;
      --white: #f7f7ff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(73, 31, 130, 0.35), transparent 28%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1) 38%, var(--bg-0));
      font-family: "Press Start 2P", monospace;
    }

    body {
      position: relative;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="ORBIT arcade game"></canvas>
  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d", { alpha: false });

      const BEST_KEY = "orbit-best-seconds";
      const DPR = () => Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
      const rand = (min, max) => min + Math.random() * (max - min);
      let width = 360;
      let height = 640;
      let unit = 6;
      let lastTime = 0;
      let pointerDown = false;
      let pointerCurrentX = 0;
      let shake = 0;
      let flash = 0;
      let bestScore = Number(localStorage.getItem(BEST_KEY) || 0);

      const input = {
        left: false,
        right: false
      };

      const state = {
        scene: "title",
        elapsed: 0,
        worldSpeed: 175,
        spawnTimer: 0,
        fuelSpawnTimer: 0,
        powerSpawnTimer: 0,
        stars: [],
        objects: [],
        particles: [],
        rocket: null,
        gameOverAt: 0
      };

      function resize() {
        const dpr = DPR();
        width = Math.floor(window.innerWidth);
        height = Math.floor(window.innerHeight);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = false;
        unit = Math.max(4, Math.floor(Math.min(width, height) / 90));
        createStars();
        if (state.rocket) {
          state.rocket.y = height * 0.78;
        }
      }

      function createStars() {
        state.stars = [
          createStarLayer(44, 0.18, "#29406e"),
          createStarLayer(28, 0.38, "#4d7bd2"),
          createStarLayer(18, 0.62, "#b8f6ff")
        ];
      }

      function createStarLayer(count, speed, color) {
        const stars = [];
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            size: Math.random() < 0.78 ? 1 : 2,
            speed,
            color
          });
        }
        return stars;
      }

      function resetGame() {
        state.scene = "running";
        state.elapsed = 0;
        state.worldSpeed = 328;
        state.spawnTimer = 0.55;
        state.fuelSpawnTimer = 3;
        state.powerSpawnTimer = 6;
        state.objects = [];
        state.particles = [];
        state.gameOverAt = 0;
        shake = 0;
        flash = 0;
        state.rocket = {
          x: width / 2,
          y: height * 0.78,
          vx: 0,
          width: unit * 5,
          height: unit * 8,
          fuel: 120,
          shield: false,
          alive: true
        };
      }

      function spawnAsteroid() {
        const size = rand(unit * 4, unit * 8);
        state.objects.push({
          type: "asteroid",
          x: rand(size, width - size),
          y: -size - rand(20, 120),
          r: size * 0.5,
          rot: rand(0, Math.PI * 2),
          spin: rand(-1.2, 1.2),
          speedMul: rand(0.92, 1.12)
        });
      }

      function spawnAlien() {
        const size = rand(unit * 5, unit * 7);
        state.objects.push({
          type: "alien",
          x: rand(size, width - size),
          y: -size - rand(40, 140),
          r: size * 0.48,
          size,
          phase: rand(0, Math.PI * 2),
          amp: rand(unit * 4, unit * 10),
          drift: rand(1.5, 3.2),
          speedMul: rand(0.98, 1.2)
        });
      }

      function spawnFuel() {
        state.objects.push({
          type: "fuel",
          x: rand(unit * 4, width - unit * 4),
          y: -unit * 6,
          r: unit * 3,
          pulse: rand(0, Math.PI * 2)
        });
      }

      function spawnPower() {
        state.objects.push({
          type: "shield",
          x: rand(unit * 4, width - unit * 4),
          y: -unit * 6,
          r: unit * 3.2,
          pulse: rand(0, Math.PI * 2)
        });
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.worldSpeed += dt * 8;
        state.spawnTimer -= dt;
        state.fuelSpawnTimer -= dt;
        state.powerSpawnTimer -= dt;
        flash = Math.max(0, flash - dt * 1.2);
        shake = Math.max(0, shake - dt * 18);

        const rocket = state.rocket;
        const steerStrength = width * 2.22;
        let steer = 0;
        if (input.left) steer -= 1;
        if (input.right) steer += 1;
        rocket.vx += steer * steerStrength * dt;
        if (pointerDown) {
          const desiredX = pointerCurrentX;
          rocket.vx += (desiredX - rocket.x) * 18 * dt;
        }
        rocket.vx *= Math.pow(0.0001, dt * 0.32);
        rocket.vx = clamp(rocket.vx, -width * 0.84, width * 0.84);
        rocket.x += rocket.vx * dt;

        if (rocket.x < -rocket.width * 0.5) rocket.x = width + rocket.width * 0.5;
        if (rocket.x > width + rocket.width * 0.5) rocket.x = -rocket.width * 0.5;

        rocket.fuel = Math.max(0, rocket.fuel - dt * (4.6 + state.elapsed * 0.06));
        if (rocket.fuel <= 0) {
          endRun("fuel");
        }

        if (state.spawnTimer <= 0) {
          const difficulty = clamp(state.elapsed / 45, 0, 1);
          const count = Math.random() < (0.36 + difficulty * 0.66) ? 2 : 1;
          for (let i = 0; i < count; i++) {
            if (Math.random() < 0.68 - difficulty * 0.15) spawnAsteroid();
            else spawnAlien();
          }
          state.spawnTimer = rand(0.21, 0.46 - difficulty * 0.11);
        }

        if (state.fuelSpawnTimer <= 0) {
          spawnFuel();
          state.fuelSpawnTimer = rand(4.1, 6.3);
        }

        if (state.powerSpawnTimer <= 0) {
          spawnPower();
          state.powerSpawnTimer = rand(8.5, 13.5);
        }

        for (const layer of state.stars) {
          for (const star of layer) {
            star.y += state.worldSpeed * star.speed * dt;
            if (star.y > height + 4) {
              star.y = -4;
              star.x = Math.random() * width;
            }
          }
        }

        for (let i = state.objects.length - 1; i >= 0; i--) {
          const obj = state.objects[i];
          const speed = state.worldSpeed * (obj.speedMul || 1);
          obj.y += speed * dt;
          if (obj.type === "asteroid") {
            obj.rot += obj.spin * dt;
          } else if (obj.type === "alien") {
            obj.phase += dt * obj.drift;
            obj.x += Math.sin(obj.phase) * obj.amp * dt;
          } else {
            obj.pulse += dt * 4;
          }

          if (obj.y > height + 120) {
            state.objects.splice(i, 1);
            continue;
          }

          if (checkCollision(rocket, obj)) {
            if (obj.type === "fuel") {
              rocket.fuel = Math.min(100, rocket.fuel + 26);
              spawnPickupBurst(obj.x, obj.y, "#ffe56b", 16);
              state.objects.splice(i, 1);
            } else if (obj.type === "shield") {
              rocket.shield = true;
              spawnPickupBurst(obj.x, obj.y, "#47f5ff", 18);
              state.objects.splice(i, 1);
            } else {
              if (rocket.shield) {
                rocket.shield = false;
                shake = Math.max(shake, 5);
                spawnPickupBurst(rocket.x, rocket.y, "#6ebdff", 24);
                state.objects.splice(i, 1);
              } else {
                endRun(obj.type);
                return;
              }
            }
          }
        }

        for (let i = state.particles.length - 1; i >= 0; i--) {
          const p = state.particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.life -= dt;
          if (p.gravity) p.vy += p.gravity * dt;
          if (p.life <= 0) state.particles.splice(i, 1);
        }
      }

      function spawnPickupBurst(x, y, color, count) {
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(24, 110);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: rand(2, 4),
            life: rand(0.25, 0.6),
            color
          });
        }
      }

      function spawnExplosion(x, y) {
        const colors = ["#f7f7ff", "#ffe56b", "#ff9c47", "#ff5a5a"];
        for (let i = 0; i < 54; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(40, 220);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - rand(0, 45),
            size: rand(3, 6),
            life: rand(0.35, 1),
            gravity: 120,
            color: colors[(Math.random() * colors.length) | 0]
          });
        }
      }

      function endRun(reason) {
        if (state.scene !== "running") return;
        state.scene = "gameover";
        state.gameOverAt = performance.now() * 0.001;
        shake = 12;
        flash = 1;
        spawnExplosion(state.rocket.x, state.rocket.y);
        state.rocket.alive = false;
        const score = Math.floor(state.elapsed);
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem(BEST_KEY, String(bestScore));
        }
      }

      function checkCollision(rocket, obj) {
        const dx = rocket.x - obj.x;
        const dy = rocket.y - obj.y;
        const rr = Math.max(rocket.width * 0.22, unit * 2.5) + obj.r;
        return dx * dx + dy * dy < rr * rr;
      }

      function update(dt) {
        dt = Math.min(dt, 1 / 30);
        if (state.scene === "running") updateRunning(dt);
        else {
          shake = Math.max(0, shake - dt * 18);
          flash = Math.max(0, flash - dt * 1.2);
          for (let i = state.particles.length - 1; i >= 0; i--) {
            const p = state.particles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt;
            if (p.gravity) p.vy += p.gravity * dt;
            if (p.life <= 0) state.particles.splice(i, 1);
          }
          for (const layer of state.stars) {
            for (const star of layer) {
              star.y += 22 * star.speed * dt;
              if (star.y > height + 4) {
                star.y = -4;
                star.x = Math.random() * width;
              }
            }
          }
        }
      }

      function drawBackground() {
        ctx.fillStyle = "#060816";
        ctx.fillRect(0, 0, width, height);

        const grd = ctx.createLinearGradient(0, 0, 0, height);
        grd.addColorStop(0, "#1a0f30");
        grd.addColorStop(0.42, "#091126");
        grd.addColorStop(1, "#050914");
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = "rgba(150, 80, 255, 0.06)";
        for (let y = 0; y < height; y += unit * 8) {
          ctx.fillRect(0, y, width, 1);
        }

        for (const layer of state.stars) {
          for (const star of layer) {
            ctx.fillStyle = star.color;
            ctx.fillRect(Math.round(star.x), Math.round(star.y), star.size, star.size);
          }
        }
      }

      function drawRocket(rocket) {
        const x = Math.round(rocket.x);
        const y = Math.round(rocket.y);
        const tilt = clamp(rocket.vx / 200, -1, 1);

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(tilt * 0.15);

        if (rocket.shield) {
          ctx.strokeStyle = "#47f5ff";
          ctx.lineWidth = 3;
          ctx.shadowBlur = 18;
          ctx.shadowColor = "#47f5ff";
          ctx.beginPath();
          ctx.arc(0, 0, unit * 5.2, 0, Math.PI * 2);
          ctx.stroke();
          ctx.shadowBlur = 0;
        }

        const flameH = unit * (2 + Math.random() * 2);
        ctx.fillStyle = "#ff5a5a";
        ctx.fillRect(-unit, unit * 4, unit * 2, flameH);
        ctx.fillStyle = "#ffe56b";
        ctx.fillRect(-unit * 0.5, unit * 4, unit, flameH * 0.65);

        ctx.fillStyle = "#f7f7ff";
        ctx.fillRect(-unit * 1.5, -unit * 3, unit * 3, unit * 6);
        ctx.fillStyle = "#ffe56b";
        ctx.fillRect(-unit, -unit * 4, unit * 2, unit);
        ctx.fillStyle = "#ff9c47";
        ctx.fillRect(-unit * 2.5, unit * 1, unit, unit * 2);
        ctx.fillRect(unit * 1.5, unit * 1, unit, unit * 2);
        ctx.fillStyle = "#6ebdff";
        ctx.fillRect(-unit * 0.5, -unit * 1.5, unit, unit * 2);
        ctx.restore();
      }

      function drawAsteroid(obj) {
        ctx.save();
        ctx.translate(Math.round(obj.x), Math.round(obj.y));
        ctx.rotate(obj.rot);
        const r = obj.r;
        ctx.fillStyle = "#4d2c2f";
        ctx.fillRect(-r * 0.9, -r * 0.45, r * 0.35, r * 0.75);
        ctx.fillRect(-r * 0.55, -r * 0.75, r * 0.6, r * 1.4);
        ctx.fillRect(r * 0.05, -r * 0.6, r * 0.7, r * 1.15);
        ctx.fillRect(-r * 0.15, r * 0.35, r * 0.55, r * 0.35);
        ctx.fillStyle = "#8b4b31";
        ctx.fillRect(-r * 0.6, -r * 0.45, r * 0.35, r * 0.4);
        ctx.fillRect(-r * 0.05, -r * 0.15, r * 0.42, r * 0.3);
        ctx.fillRect(r * 0.2, 0, r * 0.24, r * 0.24);
        ctx.fillStyle = "#c87941";
        ctx.fillRect(-r * 0.18, -r * 0.48, r * 0.2, r * 0.2);
        ctx.fillRect(r * 0.12, -r * 0.32, r * 0.18, r * 0.18);
        ctx.fillStyle = "#2d1820";
        ctx.fillRect(-r * 0.38, 0, r * 0.18, r * 0.18);
        ctx.fillRect(r * 0.32, 0.18 * r, r * 0.16, r * 0.16);
        ctx.restore();
      }

      function drawAlien(obj) {
        ctx.save();
        ctx.translate(Math.round(obj.x), Math.round(obj.y));
        const size = obj.size;
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#70ff8e";
        ctx.fillStyle = "#1f612f";
        ctx.fillRect(-size * 0.55, -size * 0.2, size * 1.1, size * 0.38);
        ctx.fillStyle = "#70ff8e";
        ctx.fillRect(-size * 0.3, -size * 0.45, size * 0.6, size * 0.25);
        ctx.fillStyle = "#091126";
        ctx.fillRect(-size * 0.18, -size * 0.12, size * 0.1, size * 0.1);
        ctx.fillRect(size * 0.08, -size * 0.12, size * 0.1, size * 0.1);
        ctx.shadowBlur = 0;
        ctx.restore();
      }

      function drawPickup(obj) {
        const colors = {
          fuel: "#ffe56b",
          shield: "#47f5ff"
        };
        const glow = colors[obj.type];
        const pulse = 1 + Math.sin(obj.pulse) * 0.18;
        ctx.save();
        ctx.translate(Math.round(obj.x), Math.round(obj.y));
        ctx.scale(pulse, pulse);
        ctx.shadowBlur = 16;
        ctx.shadowColor = glow;
        ctx.strokeStyle = glow;
        ctx.fillStyle = glow;
        if (obj.type === "fuel") {
          ctx.fillRect(-unit * 1.4, -unit * 1.8, unit * 2.6, unit * 3.4);
          ctx.fillRect(unit * 0.7, -unit * 1.2, unit * 0.7, unit * 0.9);
          ctx.fillStyle = "#091126";
          ctx.fillRect(-unit * 0.55, -unit * 0.35, unit * 1.1, unit * 1.1);
          ctx.fillRect(unit * 0.55, -unit * 1.15, unit * 0.35, unit * 0.35);
          ctx.fillStyle = glow;
          ctx.fillRect(-unit * 0.15, -unit * 1.15, unit * 0.3, unit * 0.9);
          ctx.fillRect(-unit * 0.85, unit * 0.1, unit * 1.7, unit * 0.28);
        } else if (obj.type === "shield") {
          ctx.beginPath();
          ctx.arc(0, 0, unit * 2.2, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawParticles() {
        for (const p of state.particles) {
          ctx.globalAlpha = clamp(p.life * 1.8, 0, 1);
          ctx.fillStyle = p.color;
          ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
        }
        ctx.globalAlpha = 1;
      }

      function drawHud() {
        const score = Math.floor(state.elapsed);
        const safeTop = 14;
        const hudY = safeTop + 12;

        ctx.font = `${Math.max(10, unit * 1.8)}px "Press Start 2P"`;
        ctx.textBaseline = "top";

        ctx.fillStyle = "rgba(5, 9, 20, 0.65)";
        ctx.fillRect(12, hudY - 4, width - 24, unit * 6);

        ctx.fillStyle = "#f7f7ff";
        ctx.textAlign = "left";
        ctx.fillText("FUEL", 18, hudY + 4);

        const barX = 18;
        const barY = hudY + unit * 3.2;
        const barW = Math.min(width * 0.24, 120);
        const barH = unit * 1.6;
        ctx.strokeStyle = "#b8f6ff";
        ctx.lineWidth = 2;
        ctx.strokeRect(barX, barY, barW, barH);
        const fuelMax = 120;
        const innerPad = 3;
        ctx.fillStyle = state.rocket.fuel > fuelMax * 0.25 ? "#47f5ff" : "#ff5a5a";
        ctx.shadowBlur = 10;
        ctx.shadowColor = ctx.fillStyle;
        ctx.fillRect(
          barX + innerPad,
          barY + innerPad,
          (barW - innerPad * 2) * clamp(state.rocket.fuel / fuelMax, 0, 1),
          barH - innerPad * 2
        );
        ctx.shadowBlur = 0;

        ctx.textAlign = "center";
        ctx.fillStyle = "#f7f7ff";
        ctx.fillText(score + "s", width / 2, hudY + 4);

        ctx.textAlign = "right";
        ctx.fillText("BEST " + bestScore + "s", width - 18, hudY + 4);
      }

      function drawTitle() {
        const panelW = Math.min(width * 0.9, 380);
        const panelH = Math.min(height * 0.52, 360);
        const x = (width - panelW) / 2;
        const y = height * 0.12;
        ctx.fillStyle = "rgba(5, 9, 20, 0.84)";
        ctx.fillRect(x, y, panelW, panelH);
        ctx.strokeStyle = "#ae56ff";
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, panelW, panelH);

        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillStyle = "#f7f7ff";
        ctx.font = `${Math.max(18, unit * 3.2)}px "Press Start 2P"`;
        ctx.fillText("ORBIT", width / 2, y + 20);

        ctx.fillStyle = "#47f5ff";
        ctx.font = `${Math.max(9, unit * 1.45)}px "Press Start 2P"`;
        ctx.fillText("SLIDE LEFT / RIGHT", width / 2, y + 74);
        ctx.fillText("OR USE A / D", width / 2, y + 96);

        ctx.fillStyle = "#ffe56b";
        ctx.fillText("SURVIVE AS LONG", width / 2, y + 136);
        ctx.fillText("AS YOU CAN", width / 2, y + 158);

        ctx.fillStyle = "#f7f7ff";
        ctx.fillText("FUEL CAN = MORE FUEL", width / 2, y + 198);
        ctx.fillText("CYAN RING = 1 HIT SHIELD", width / 2, y + 220);
        ctx.fillText("DODGE ROCKS + ALIENS", width / 2, y + 242);

        ctx.fillStyle = "#47f5ff";
        ctx.fillText("TAP TO LAUNCH", width / 2, y + panelH - 48);
      }

      function drawGameOver() {
        const score = Math.floor(state.elapsed);
        drawCenteredPanel("GAME OVER", "TIME " + score + "s", "BEST " + bestScore + "s");
        const btnW = Math.min(width * 0.72, 250);
        const btnH = unit * 8;
        const btnX = (width - btnW) / 2;
        const btnY = height * 0.68;
        ctx.fillStyle = "#47f5ff";
        ctx.shadowBlur = 16;
        ctx.shadowColor = "#47f5ff";
        ctx.fillRect(btnX, btnY, btnW, btnH);
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#091126";
        ctx.font = `${Math.max(12, unit * 2)}px "Press Start 2P"`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("PLAY AGAIN", width / 2, btnY + btnH / 2 + 1);
      }

      function drawCenteredPanel(title, line1, line2) {
        const panelW = Math.min(width * 0.86, 340);
        const panelH = Math.min(height * 0.34, 240);
        const x = (width - panelW) / 2;
        const y = height * 0.2;
        ctx.fillStyle = "rgba(5, 9, 20, 0.8)";
        ctx.fillRect(x, y, panelW, panelH);
        ctx.strokeStyle = "#ae56ff";
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, panelW, panelH);

        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillStyle = "#f7f7ff";
        ctx.font = `${Math.max(18, unit * 3.2)}px "Press Start 2P"`;
        ctx.fillText(title, width / 2, y + 24);
        ctx.fillStyle = "#47f5ff";
        ctx.font = `${Math.max(10, unit * 1.7)}px "Press Start 2P"`;
        ctx.fillText(line1, width / 2, y + panelH * 0.48);
        ctx.fillStyle = "#ffe56b";
        ctx.fillText(line2, width / 2, y + panelH * 0.68);
      }

      function render() {
        const sx = shake > 0 ? rand(-shake, shake) : 0;
        const sy = shake > 0 ? rand(-shake, shake) : 0;
        ctx.save();
        ctx.translate(sx, sy);
        drawBackground();

        for (const obj of state.objects) {
          if (obj.type === "asteroid") drawAsteroid(obj);
          else if (obj.type === "alien") drawAlien(obj);
          else drawPickup(obj);
        }

        if (state.rocket?.alive) drawRocket(state.rocket);
        drawParticles();
        drawHud();
        if (flash > 0) {
          ctx.fillStyle = `rgba(255,255,255,${flash * 0.22})`;
          ctx.fillRect(0, 0, width, height);
        }

        if (state.scene === "title") drawTitle();
        if (state.scene === "gameover") drawGameOver();
        ctx.restore();
      }

      function frame(ts) {
        const now = ts * 0.001;
        const dt = lastTime ? now - lastTime : 1 / 60;
        lastTime = now;
        update(dt);
        render();
        requestAnimationFrame(frame);
      }

      function handlePress(x, y) {
        if (state.scene === "title") {
          resetGame();
          return;
        }
        if (state.scene === "gameover") {
          const btnW = Math.min(width * 0.72, 250);
          const btnH = unit * 8;
          const btnX = (width - btnW) / 2;
          const btnY = height * 0.68;
          if (x >= btnX && x <= btnX + btnW && y >= btnY && y <= btnY + btnH) {
            resetGame();
          }
        }
      }

      window.addEventListener("keydown", (event) => {
        if (["ArrowLeft", "ArrowRight", " ", "Enter"].includes(event.key)) {
          event.preventDefault();
        }
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") input.left = true;
        if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") input.right = true;
        if ((event.key === " " || event.key === "Enter") && state.scene !== "running") {
          resetGame();
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") input.left = false;
        if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") input.right = false;
      });

      canvas.addEventListener("pointerdown", (event) => {
        pointerDown = true;
        pointerCurrentX = event.clientX;
        handlePress(event.clientX, event.clientY);
        if (state.scene === "running") {
          input.left = false;
          input.right = false;
        }
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!pointerDown || state.scene !== "running") return;
        pointerCurrentX = event.clientX;
      });

      canvas.addEventListener("pointerup", () => {
        pointerDown = false;
        input.left = false;
        input.right = false;
      });

      canvas.addEventListener("pointercancel", () => {
        pointerDown = false;
        input.left = false;
        input.right = false;
      });

      window.addEventListener("resize", resize);

      resize();
      resetGame();
      state.scene = "title";
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
